<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Odors & Verses | 취향의 개봉</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #fffef5;
            --text-color: #333;
            /* 사용자 취향 색 (나중에 JS로 동적 변경 가능) */
            --vibe-color-1: #b8c6db; 
            --vibe-color-2: #f5f7fa;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Nanum Myeongjo', serif;
            height: 100vh;
            overflow: hidden; /* 인트로 중 스크롤 방지 */
            color: var(--text-color);
        }

        /* [1] 인트로 화면 (흰색, 봉인) */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: whitesmoke; /* 깨끗한 흰색 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100; /* 메인 화면 위에 배치 */
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s; /* 커튼처럼 걷히는 효과 */
        }

        /* 편지 뜯는 느낌의 클릭 이미지 (왁스 실/봉투) */
        .seal-image {
            width: 80px; /* 작게 설정 */
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            filter: grayscale(100%) opacity(0.7); /* 미니멀하게 처리 */
        }

        .seal-image:hover {
            transform: scale(1.1) rotate(-5deg); /* 미세한 반응 */
            filter: grayscale(0%) opacity(1);
        }

        /* 인트로 걷히는 애니메이션 클래스 */
        #intro-screen.opened {
            transform: translateY(-100%); /* 위로 커튼처럼 걷힘 */
            opacity: 0;
        }


        /* [2] 메인 취향 매칭 화면 (Odors & Verses) */
        #main-screen {
            display: flex;
            height: 100vh;
            opacity: 0; /* 처음엔 숨김 */
            transition: opacity 1.5s ease 0.5s; /* 인트로 걷힌 후 서서히 나타남 */
        }

        #intro-screen.opened + #main-screen {
            opacity: 1; /* 인트로가 열리면 보여줌 */
        }

        /* 향기 레이어 (배경) */
        .scent-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--vibe-color-1), var(--vibe-color-2));
            filter: blur(100px);
            opacity: 0.5;
            z-index: -1;
        }

        /* 나머지 메인 화면 스타일 (이전과 동일) */
        .archive-section {
            flex: 1; padding: 60px;
            display: flex; flex-direction: column; justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .vibe-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px; margin-bottom: 25px;
            border-radius: 10px;
            transition: 0.5s; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .vibe-card:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(10px); }

        .letter-section {
            flex: 1; padding: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        .paper {
            background: var(--paper-color);
            width: 85%; height: 75%;
            padding: 50px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            transform: rotate(0.5deg);
        }

        textarea {
            width: 100%; height: 90%;
            border: none; background: transparent;
            resize: none; font-size: 1.1rem; line-height: 2.2;
            outline: none; font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <svg class="seal-image" onclick="openLetter()" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#8B0000" stroke="#660000" stroke-width="2"/>
            <path d="M30 50 L50 70 L70 30" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
        </svg>
    </div>

    <div id="main-screen">
        <div class="scent-layer"></div>
        
        <div class="archive-section">
            <div class="vibe-card">
                <h3>Fashion: Silk & Wood</h3>
                <p>무광택의 질감과 나무 향을 좋아합니다.</p>
            </div>
            <div class="vibe-card">
                <h3>Literature: 이상(Yi Sang)</h3>
                <p>"박제가 되어버린 천재를 아시오?" - 날개</p>
            </div>
            <div class="vibe-card">
                <h3>Music: Lo-fi Midnight</h3>
                <p>새벽 2시에 어울리는 비트를 수집합니다.</p>
            </div>
        </div>

        <div class="letter-section">
            <div class="paper">
                <textarea placeholder="편지를 개봉하셨군요. 당신의 취향을 문장으로 담아보세요."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 편지 개봉 함수
        function openLetter() {
            // 인트로 화면에 'opened' 클래스를 추가하여 CSS 애니메이션 트리거
            document.getElementById('intro-screen').classList.add('opened');
            
            // 메인 화면 스크롤 허용 (필요시)
            setTimeout(() => {
                document.body.style.overflow = 'auto';
            }, 1000);
        }
    </script>

</body>
</html>
